name: Update TCG dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: tcg-dashboard-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update data from Sneaker Dunk
        run: node source_updater.mjs

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tcg_data.json tcg_data.js tcg_data_cumulative.json tcg_data_cumulative.js source_update_status.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update TCG dashboard data"
            git push
          fi
